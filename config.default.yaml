# otto-coms configuration
# CLI args override these values

audio:
  device: null          # null = system default; device name or index for both input + output
  input_device: null    # null = use 'device'; mic override (supports ALSA paths e.g. "hw:1,0")
  output_device: null   # null = use 'device'; speaker override
  sample_rate: 16000
  block_size: 512       # 32ms at 16kHz, matches Silero VAD window
  gain: 1.0
  reconnect_timeout_s: 5.0  # seconds without audio before attempting device reconnect

vad:
  threshold: 0.5
  silence_duration_ms: 700
  min_speech_duration_ms: 250
  speech_pad_ms: 250

stt:
  model: auto           # auto, tiny, base, small, medium, large-v3
  device: auto          # auto, cpu, cuda
  compute_type: auto    # auto, int8, float16, float32
  language: en
  beam_size: 5
  cpu_threads: 0        # 0 = auto

outputs:
  - console

output_settings:
  file:
    path: transcriptions.txt
    mode: append
  clipboard:
    paste: true
    paste_delay_ms: 50
    auto_send: true
    auto_send_delay_ms: 2000
  websocket:
    host: localhost
    port: 8765
  otto_api:
    url: http://otto-core-01:8080
    timeout: 60
    return_audio: true
    voice: default
    provider: ollama

compose:
  enabled: false
  auto_send_delay_ms: 8000
  llm_cleanup: true

llm:
  enabled: false
  provider: ollama
  ollama:
    base_url: http://localhost:11434
    model: llama3.2
  claude:
    base_url: http://localhost:3000
    model: claude-sonnet-4-20250514

tts:
  enabled: true
  voice: en-IE-EmilyNeural   # edge-tts voice (use `edge-tts --list-voices`)
  rate: "+30%"                # speed adjustment (e.g. "+10%", "-20%")
  volume: "+0%"               # volume adjustment

listening:
  mode: continuous      # continuous or wake_word
  wake_word:
    model: models/wake_word/computer.onnx   # built-in name or path to ONNX file
    threshold: 0.5
    timeout_seconds: 60
    feedback_beep: true

transmission:
  mode: sync            # sync or async
  async_callback_host: "0.0.0.0"
  async_callback_port: 8766


speak_api:
  host: "0.0.0.0"
  port: 8766
  voice: null                    # TTS voice override, e.g. en-US-AriaNeural (null = use tts.voice)
  vad_silence_duration_ms: 2000  # silence within a speech segment before emitting
  end_of_response_silence_s: 8.0 # silence after last segment before resolving full response
  default_timeout: 120.0         # seconds to wait for spoken response
